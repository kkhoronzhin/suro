{% extends "base.html" %}

{% block title %}SURO Admin - 100₽ за отзыв{% endblock %}

{% block content %}
<div class="header">
    <h1>100₽ - Текстовые отзывы</h1>
    <div class="header-actions">
        <a href="/admin/contests/100/export" class="btn btn-primary">
            <i class="fas fa-download"></i>
            Экспорт
        </a>
        <a href="/admin/contests" class="btn">
            <i class="fas fa-arrow-left"></i>
            Назад
        </a>
    </div>
</div>

<!-- Фильтры -->
<div class="filters">
    <div class="tabs">
        <div class="tab active" onclick="filterApps('all')">Все</div>
        <div class="tab" onclick="filterApps('pending')">Ожидают</div>
        <div class="tab" onclick="filterApps('approved')">Одобрено</div>
        <div class="tab" onclick="filterApps('rejected')">Отклонено</div>
    </div>
    
    <div class="search-bar">
        <input type="text" class="search-input" placeholder="Поиск по ID, артикулу или телефону..." id="searchInput">
        <button class="btn" onclick="searchApps()">
            <i class="fas fa-search"></i>
            Найти
        </button>
    </div>
</div>

<!-- Таблица заявок -->
<div class="table-container">
    <table id="appsTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Дата</th>
                <th>Пользователь</th>
                <th>Артикул</th>
                <th>Телефон</th>
                <th>Скриншоты</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody id="appsList">
            <!-- Загружается через API -->
        </tbody>
    </table>
    <div class="loading" id="loading" style="display: none;">
        <i class="fas fa-spinner"></i>
        Загрузка...
    </div>
</div>

<!-- Пагинация -->
<div class="pagination" id="pagination"></div>

<!-- Модалка просмотра -->
<div class="modal" id="viewModal">
    <div class="modal-content" style="max-width: 800px;">
        <div class="modal-header">
            <h3 class="modal-title">Заявка #<span id="viewId"></span></h3>
            <button class="modal-close" onclick="Modal.hide('viewModal')">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body" id="viewContent">
            <!-- Данные загружаются динамически -->
        </div>
        <div class="modal-actions">
            <button class="btn" onclick="Modal.hide('viewModal')">Закрыть</button>
        </div>
    </div>
</div>

<script>
let currentPage = 1;
let currentFilter = 'all';
let currentSearch = '';

async function loadApps() {
    const loading = document.getElementById('loading');
    const tbody = document.getElementById('appsList');
    
    loading.style.display = 'flex';
    
    try {
        const data = await API.get('/applications', {
            page: currentPage,
            per_page: 20,
            type: '100',
            status: currentFilter !== 'all' ? currentFilter : null,
            search: currentSearch
        });
        
        renderApps(data.data.applications);
        renderPagination(data.data.pagination);
    } catch (error) {
        console.error('Error:', error);
    } finally {
        loading.style.display = 'none';
    }
}

function renderApps(apps) {
    const tbody = document.getElementById('appsList');
    
    if (!apps || apps.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 2rem;">Заявки не найдены</td></tr>';
        return;
    }
    
    tbody.innerHTML = apps.map(app => `
        <tr>
            <td>${app.id}</td>
            <td>${DateFormatter.format(app.created_at, 'short')}</td>
            <td>
                <a href="/admin/users/${app.user_id}" style="color: #3b82f6;">
                    @${app.username || 'unknown'}
                </a>
            </td>
            <td>
                <a href="https://www.wildberries.ru/catalog/${app.article}/detail.aspx" 
                   target="_blank" style="color: #3b82f6;">
                    ${app.article}
                </a>
            </td>
            <td>${app.phone}</td>
            <td>
                <div class="actions">
                    <a href="${app.review_photo}" target="_blank" class="action-btn" title="Отзыв">
                        <i class="fas fa-star"></i>
                    </a>
                    <a href="${app.purchase_photo}" target="_blank" class="action-btn" title="Покупка">
                        <i class="fas fa-shopping-cart"></i>
                    </a>
                </div>
            </td>
            <td>
                <span class="badge ${getStatusBadge(app.status)}">
                    ${getStatusText(app.status)}
                </span>
            </td>
            <td>
                <div class="actions">
                    <button class="action-btn" onclick="viewApp(${app.id})" title="Просмотр">
                        <i class="fas fa-eye"></i>
                    </button>
                    <button class="action-btn" onclick="approveApp(${app.id})" title="Одобрить">
                        <i class="fas fa-check"></i>
                    </button>
                    <button class="action-btn delete" onclick="rejectApp(${app.id})" title="Отклонить">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </td>
        </tr>
    `).join('');
}

function getStatusBadge(status) {
    const badges = {
        0: 'badge-warning',
        1: 'badge-success',
        2: 'badge-danger'
    };
    return badges[status] || 'badge-muted';
}

function getStatusText(status) {
    const texts = {
        0: 'Ожидает',
        1: 'Одобрено',
        2: 'Отклонено'
    };
    return texts[status] || 'Неизвестно';
}

function renderPagination(pagination) {
    const container = document.getElementById('pagination');
    let html = '';
    
    if (pagination.page > 1) {
        html += `<button class="page-btn" onclick="changePage(${pagination.page - 1})">
            <i class="fas fa-chevron-left"></i>
        </button>`;
    }
    
    for (let i = Math.max(1, pagination.page - 2); 
         i <= Math.min(pagination.pages, pagination.page + 2); i++) {
        html += `<button class="page-btn ${i === pagination.page ? 'active' : ''}" 
                 onclick="changePage(${i})">${i}</button>`;
    }
    
    if (pagination.page < pagination.pages) {
        html += `<button class="page-btn" onclick="changePage(${pagination.page + 1})">
            <i class="fas fa-chevron-right"></i>
        </button>`;
    }
    
    container.innerHTML = html;
}

function changePage(page) {
    currentPage = page;
    loadApps();
}

function filterApps(filter) {
    currentFilter = filter;
    currentPage = 1;
    
    // Обновляем активный таб
    document.querySelectorAll('.tab').forEach(tab => {
        tab.classList.remove('active');
    });
    event.target.classList.add('active');
    
    loadApps();
}

function searchApps() {
    currentSearch = document.getElementById('searchInput').value;
    currentPage = 1;
    loadApps();
}

async function viewApp(id) {
    try {
        const data = await API.get(`/applications/${id}`);
        
        const app = data.data;
        document.getElementById('viewId').textContent = id;
        document.getElementById('viewContent').innerHTML = `
            <div style="display: grid; gap: 1rem;">
                <p><strong>Пользователь:</strong> @${app.username} (ID: ${app.user_id})</p>
                <p><strong>Артикул:</strong> ${app.article}</p>
                <p><strong>Телефон:</strong> ${app.phone}</p>
                <p><strong>Дата отзыва:</strong> ${app.review_date}</p>
                <p><strong>Создано:</strong> ${DateFormatter.format(app.created_at, 'long')}</p>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div>
                        <strong>Скриншот отзыва:</strong><br>
                        <img src="${app.review_photo}" style="max-width: 100%; border-radius: 8px; margin-top: 0.5rem;">
                    </div>
                    <div>
                        <strong>Скриншот покупки:</strong><br>
                        <img src="${app.purchase_photo}" style="max-width: 100%; border-radius: 8px; margin-top: 0.5rem;">
                    </div>
                </div>
            </div>
        `;
        
        Modal.show('viewModal');
    } catch (error) {
        console.error('Error:', error);
    }
}

async function approveApp(id) {
    Modal.showConfirm({
        title: 'Подтверждение',
        message: 'Отметить заявку как выполненную и выплатить 100₽?',
        onConfirm: async () => {
            try {
                await API.post(`/applications/${id}/status`, { status: 1 });
                Notifications.success('Заявка одобрена');
                loadApps();
            } catch (error) {
                Notifications.error('Ошибка при одобрении');
            }
        }
    });
}

async function rejectApp(id) {
    Modal.showConfirm({
        title: 'Подтверждение',
        message: 'Отклонить заявку?',
        onConfirm: async () => {
            try {
                await API.post(`/applications/${id}/status`, { status: 2 });
                Notifications.success('Заявка отклонена');
                loadApps();
            } catch (error) {
                Notifications.error('Ошибка при отклонении');
            }
        }
    });
}

// Загрузка при старте
document.addEventListener('DOMContentLoaded', loadApps);

// Дебаунс для поиска
const debouncedSearch = debounce(searchApps, 500);
document.getElementById('searchInput').addEventListener('input', debouncedSearch);
</script>
{% endblock %}
