{% extends "base.html" %}

{% block title %}SURO Admin - Все заявки{% endblock %}

{% block content %}
<div class="header">
    <h1>Все заявки</h1>
    <div class="header-actions">
        <a href="/admin/applications/export" class="btn btn-primary">
            <i class="fas fa-download"></i>
            Экспорт
        </a>
    </div>
</div>

<!-- Фильтры -->
<div class="filters" style="display: grid; gap: 1rem; margin-bottom: 1.5rem;">
    <div class="tabs">
        <div class="tab active" onclick="filterApps('all')">Все</div>
        <div class="tab" onclick="filterApps('pending')">Ожидают</div>
        <div class="tab" onclick="filterApps('approved')">Одобрено</div>
        <div class="tab" onclick="filterApps('rejected')">Отклонено</div>
    </div>
    
    <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
        <select class="form-select" id="typeFilter" style="width: 150px;">
            <option value="all">Все типы</option>
            <option value="100">100₽</option>
            <option value="150">150₽</option>
            <option value="250">250₽</option>
            <option value="raffle">5000₽</option>
        </select>
        
        <div class="search-bar" style="flex: 1; margin: 0;">
            <input type="text" class="search-input" placeholder="Поиск по ID, артикулу или телефону..." id="searchInput">
            <button class="btn" onclick="searchApps()">
                <i class="fas fa-search"></i>
                Найти
            </button>
        </div>
    </div>
</div>

<!-- Таблица заявок -->
<div class="table-container">
    <table id="appsTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Тип</th>
                <th>Дата</th>
                <th>Пользователь</th>
                <th>Артикул</th>
                <th>Телефон</th>
                <th>Скриншоты</th>
                <th>Статус</th>
                <th>Выплата</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody id="appsList">
            <!-- Загружается через API -->
        </tbody>
    </table>
    <div class="loading" id="loading" style="display: none;">
        <i class="fas fa-spinner"></i>
        Загрузка...
    </div>
</div>

<!-- Пагинация -->
<div class="pagination" id="pagination"></div>

<!-- Модалка просмотра (такая же как в других шаблонах) -->
<div class="modal" id="viewModal">
    <div class="modal-content" style="max-width: 800px;">
        <div class="modal-header">
            <h3 class="modal-title">Заявка #<span id="viewId"></span></h3>
            <button class="modal-close" onclick="Modal.hide('viewModal')">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body" id="viewContent"></div>
        <div class="modal-actions">
            <button class="btn" onclick="Modal.hide('viewModal')">Закрыть</button>
        </div>
    </div>
</div>

<script>
let currentPage = 1;
let currentFilter = 'all';
let currentType = 'all';
let currentSearch = '';

async function loadApps() {
    const loading = document.getElementById('loading');
    const tbody = document.getElementById('appsList');
    
    loading.style.display = 'flex';
    
    try {
        const data = await API.get('/applications', {
            page: currentPage,
            per_page: 20,
            type: currentType !== 'all' ? currentType : null,
            status: currentFilter !== 'all' ? currentFilter : null,
            search: currentSearch
        });
        
        renderApps(data.data.applications);
        renderPagination(data.data.pagination);
    } catch (error) {
        console.error('Error:', error);
    } finally {
        loading.style.display = 'none';
    }
}

function renderApps(apps) {
    const tbody = document.getElementById('appsList');
    
    if (!apps || apps.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" style="text-align: center; padding: 2rem;">Заявки не найдены</td></tr>';
        return;
    }
    
    tbody.innerHTML = apps.map(app => `
        <tr>
            <td>${app.id}</td>
            <td>
                <span class="badge ${getTypeBadge(app.type)}">${app.amount || app.type}₽</span>
            </td>
            <td>${DateFormatter.format(app.created_at, 'short')}</td>
            <td>
                <a href="/admin/users/${app.user_id}" style="color: #3b82f6;">
                    @${app.username || 'unknown'}
                </a>
            </td>
            <td>
                <a href="https://www.wildberries.ru/catalog/${app.article}/detail.aspx" 
                   target="_blank" style="color: #3b82f6;">
                    ${app.article || '—'}
                </a>
            </td>
            <td>${app.phone || '—'}</td>
            <td>
                <div class="actions">
                    ${app.review_photo_path ? 
                        `<a href="/media/${app.review_photo_path}" target="_blank" class="action-btn" title="Отзыв">
                            <i class="fas fa-star"></i>
                         </a>` : ''}
                    ${app.purchase_photo_path ? 
                        `<a href="/media/${app.purchase_photo_path}" target="_blank" class="action-btn" title="Покупка">
                            <i class="fas fa-shopping-cart"></i>
                         </a>` : ''}
                    ${app.publication_photo_path ? 
                        `<a href="/media/${app.publication_photo_path}" target="_blank" class="action-btn" title="Сторис">
                            <i class="fas fa-instagram"></i>
                         </a>` : ''}
                </div>
            </td>
            <td>
                <span class="badge ${getStatusBadge(app.status)}">
                    ${getStatusText(app.status)}
                </span>
            </td>
            <td>${(app.paid_amount || 0).toLocaleString()}₽</td>
            <td>
                <div class="actions">
                    <button class="action-btn" onclick="viewApp(${app.id})" title="Просмотр">
                        <i class="fas fa-eye"></i>
                    </button>
                    <button class="action-btn" onclick="approveApp(${app.id}, ${app.amount})" title="Одобрить">
                        <i class="fas fa-check"></i>
                    </button>
                    <button class="action-btn delete" onclick="rejectApp(${app.id})" title="Отклонить">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </td>
        </tr>
    `).join('');
}

function getTypeBadge(type) {
    const badges = {
        '100': 'badge-primary',
        '150': 'badge-success',
        '250': 'badge-warning',
        'raffle': 'badge-danger'
    };
    return badges[type] || 'badge-muted';
}

function getStatusBadge(status) {
    const badges = {
        0: 'badge-warning',
        1: 'badge-success',
        2: 'badge-danger'
    };
    return badges[status] || 'badge-muted';
}

function getStatusText(status) {
    const texts = {
        0: 'Ожидает',
        1: 'Одобрено',
        2: 'Отклонено'
    };
    return texts[status] || 'Неизвестно';
}

function renderPagination(pagination) {
    const container = document.getElementById('pagination');
    let html = '';
    
    if (pagination.page > 1) {
        html += `<button class="page-btn" onclick="changePage(${pagination.page - 1})">
            <i class="fas fa-chevron-left"></i>
        </button>`;
    }
    
    for (let i = Math.max(1, pagination.page - 2); 
         i <= Math.min(pagination.pages, pagination.page + 2); i++) {
        html += `<button class="page-btn ${i === pagination.page ? 'active' : ''}" 
                 onclick="changePage(${i})">${i}</button>`;
    }
    
    if (pagination.page < pagination.pages) {
        html += `<button class="page-btn" onclick="changePage(${pagination.page + 1})">
            <i class="fas fa-chevron-right"></i>
        </button>`;
    }
    
    container.innerHTML = html;
}

function changePage(page) {
    currentPage = page;
    loadApps();
}

function filterApps(filter) {
    currentFilter = filter;
    currentPage = 1;
    
    document.querySelectorAll('.tab').forEach(tab => {
        tab.classList.remove('active');
    });
    event.target.classList.add('active');
    
    loadApps();
}

function searchApps() {
    currentSearch = document.getElementById('searchInput').value;
    currentType = document.getElementById('typeFilter').value;
    currentPage = 1;
    loadApps();
}

async function viewApp(id) {
    try {
        const data = await API.get(`/applications/${id}`);
        const app = data.data;
        
        document.getElementById('viewId').textContent = id;
        
        let photosHtml = '';
        if (app.review_photo_path || app.purchase_photo_path || app.publication_photo_path) {
            photosHtml = '<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 1rem;">';
            
            if (app.review_photo_path) {
                photosHtml += `
                    <div>
                        <strong>Отзыв:</strong><br>
                        <img src="/media/${app.review_photo_path}" style="max-width: 100%; border-radius: 8px;">
                    </div>
                `;
            }
            
            if (app.purchase_photo_path) {
                photosHtml += `
                    <div>
                        <strong>Покупка:</strong><br>
                        <img src="/media/${app.purchase_photo_path}" style="max-width: 100%; border-radius: 8px;">
                    </div>
                `;
            }
            
            if (app.publication_photo_path) {
                photosHtml += `
                    <div>
                        <strong>Публикация:</strong><br>
                        <img src="/media/${app.publication_photo_path}" style="max-width: 100%; border-radius: 8px;">
                    </div>
                `;
            }
            
            photosHtml += '</div>';
        }
        
        document.getElementById('viewContent').innerHTML = `
            <div style="display: grid; gap: 1rem;">
                <p><strong>Пользователь:</strong> @${app.username} (ID: ${app.user_id})</p>
                <p><strong>Тип:</strong> ${app.amount || app.type}₽</p>
                <p><strong>Артикул:</strong> ${app.article || '—'}</p>
                <p><strong>Телефон:</strong> ${app.phone || '—'}</p>
                <p><strong>Дата отзыва:</strong> ${app.review_date || '—'}</p>
                <p><strong>Статус:</strong> ${getStatusText(app.status)}</p>
                <p><strong>Выплачено:</strong> ${app.paid_amount || 0}₽</p>
                <p><strong>Комментарий:</strong> ${app.admin_comment || '—'}</p>
                <p><strong>Создано:</strong> ${DateFormatter.format(app.created_at, 'long')}</p>
                ${photosHtml}
            </div>
        `;
        
        Modal.show('viewModal');
    } catch (error) {
        console.error('Error:', error);
    }
}

async function approveApp(id, amount) {
    const paidAmount = await promptAmount(amount);
    if (paidAmount === null) return;
    
    Modal.showConfirm({
        title: 'Подтверждение',
        message: `Одобрить заявку #${id} с выплатой ${paidAmount}₽?`,
        onConfirm: async () => {
            try {
                await API.post(`/applications/${id}/status`, { 
                    status: 1, 
                    paid_amount: paidAmount 
                });
                Notifications.success('Заявка одобрена');
                loadApps();
            } catch (error) {
                Notifications.error('Ошибка при одобрении');
            }
        }
    });
}

async function rejectApp(id) {
    const comment = await promptComment();
    if (comment === null) return;
    
    Modal.showConfirm({
        title: 'Подтверждение',
        message: `Отклонить заявку #${id}?`,
        onConfirm: async () => {
            try {
                await API.post(`/applications/${id}/status`, { 
                    status: 2,
                    comment: comment 
                });
                Notifications.success('Заявка отклонена');
                loadApps();
            } catch (error) {
                Notifications.error('Ошибка при отклонении');
            }
        }
    });
}

function promptAmount(defaultAmount) {
    return new Promise((resolve) => {
        const amount = prompt('Введите сумму выплаты:', defaultAmount);
        if (amount === null) {
            resolve(null);
        } else {
            const num = parseInt(amount);
            if (isNaN(num) || num <= 0) {
                Notifications.warning('Введите корректную сумму');
                resolve(null);
            } else {
                resolve(num);
            }
        }
    });
}

function promptComment() {
    return new Promise((resolve) => {
        const comment = prompt('Причина отклонения (необязательно):');
        resolve(comment || '');
    });
}

document.addEventListener('DOMContentLoaded', () => {
    loadApps();
    document.getElementById('typeFilter').addEventListener('change', searchApps);
});

const debouncedSearch = debounce(searchApps, 500);
document.getElementById('searchInput').addEventListener('input', debouncedSearch);
</script>
{% endblock %}
